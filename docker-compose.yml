version: '3.8'

services:
  db_papeleria:
    image: mysql:8.0
    container_name: api_papeleria_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: db_papeleria
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: